name: CI - ESRA (Hermes Implementation)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Validate Python syntax
        run: |
          python -m py_compile tools/evolution-hook.py
          echo "✅ evolution-hook.py syntax OK"

      - name: Check all skills have SKILL.md
        run: |
          echo "Checking ESRA meta-skills..."
          missing=0
          for skill in optional-skills/evolutionary-self-dev/*/; do
            name=$(basename "$skill")
            if [ -f "${skill}SKILL.md" ]; then
              echo "✅ $name"
            else
              echo "❌ $name - missing SKILL.md"
              missing=1
            fi
          done
          if [ $missing -eq 1 ]; then
            exit 1
          fi

      - name: Validate SKILL.md frontmatter (basic)
        run: |
          echo "Validating frontmatter..."
          for skill in optional-skills/evolutionary-self-dev/*/SKILL.md; do
            name=$(basename $(dirname "$skill"))
            if grep -q "^name:" "$skill" && grep -q "^description:" "$skill"; then
              echo "✅ $name has name + description"
            else
              echo "❌ $name missing required frontmatter fields"
              exit 1
            fi
          done

      - name: Guard against old branding
        run: |
          echo "Checking for forbidden old naming..."
          if grep -r -i --include="*.md" -E "Evolutionary Self-Development Architecture|ESDA[^R]|Self-Development Architecture" \
               README.md AGENTS.md optional-skills/ tools/ 2>/dev/null; then
            echo "❌ Found residual old branding. Please update to ESRA."
            exit 1
          else
            echo "✅ No old branding detected"
          fi

      - name: Verify key documentation
        run: |
          [ -f "README.md" ] && echo "✅ README.md exists"
          [ -f "AGENTS.md" ] && echo "✅ AGENTS.md exists"
          grep -q "ESRA" README.md && echo "✅ README.md mentions ESRA"
          grep -q "rrpauls/esra" README.md && echo "✅ README.md links to esra specification repo"
          grep -q "ESRA" AGENTS.md && echo "✅ AGENTS.md mentions ESRA"

      - name: Verify install script
        run: |
          if [ -x "install-evolutionary-skills.sh" ]; then
            echo "✅ install-evolutionary-skills.sh is executable"
          else
            echo "❌ install-evolutionary-skills.sh is not executable"
            exit 1
          fi

      - name: Summary
        run: |
          echo "✅ All ESRA validation checks passed"
          echo "Repository is consistent with Evolutionary Self-Recursive Architecture"
